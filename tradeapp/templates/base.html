{% load static %}
<!doctype html>
<html lang="ja" data-bs-theme="auto">
  <head><script src="../assets/js/color-modes.js"></script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
    <meta name="generator" content="Hugo 0.112.5">
    <title>{% block title %}{% endblock %}</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" 
          crossorigin="anonymous">
        <link href="{% static 'css/styles.css' %}?v=2" rel="stylesheet">



  </head>
  <body>
    <h1 class="visually-hidden">Headers examples</h1>

    <div class="container">
      <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
          <!-- icon -->
          <div class="header-icon"></div>
        </a>

        <ul class="nav nav-pills">
          <li class="nav-item"><a href="{% url 'tradeapp:search_view' %}" class="nav-link active" aria-current="page">検索</a></li>
          <li class="nav-item"><a href="{% url 'tradeapp:trade_view' %}" class="nav-link">トレード</a></li>
          <li class="nav-item"><a href="{% url 'tradeapp:portfolio' %}" class="nav-link">ポートフォリオ</a></li>
          <li class="nav-item"><a href="{% url 'tradeapp:holdings_ratio' %}" class="nav-link">保有率</a></li>
          {% if request.user.is_authenticated %}
              <li class="nav-item"><a href="{% url 'accounts:logout' %}" class="nav-link">ログアウト</a></li>
          {% else %}
              <li class="nav-item"><a href="{% url 'accounts:login' %}" class="nav-link">ログイン</a></li>
              <li class="nav-item"><a href="{% url 'accounts:signup' %}" class="nav-link">サインアップ</a></li>
          {% endif %}
          <li class="nav-item"><a href="{% url 'tradeapp:contact' %}" class="nav-link">お問い合わせ</a></li>
        </ul>
      </header>
    </div>
    <main class="main_container">
    {% block content %}
    {% endblock %}
    </main>
      <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
