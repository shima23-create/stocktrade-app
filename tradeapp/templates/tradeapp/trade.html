{% extends "base.html" %}
{% block content %}
<h3>株を購入</h3>
<form method="POST" action="{% url 'tradeapp:buy_stock' %}">
    {% csrf_token %}
    <input type="text" name="ticker" placeholder="銘柄コード" required>
    <input type="number" name="quantity" placeholder="数量" min="1" required>
    <button type="submit">購入</button>
</form>

{% endblock %}
