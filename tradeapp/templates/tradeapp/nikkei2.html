{% extends "base.html" %}
<title>{% block title %}日経平均株価{% endblock %}</title>
    {% block content %}
    <h1>日経225</h1>
    <div class="tradingview-widget-container">
        <div id="tradingview_n225"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "width": "100%",
                    "height": 500,
                    "symbol": "INDEX:NKY",
                    "interval": "D",
                    "timezone": "Asia/Tokyo",
                    "theme": "light",
                    "style": "1",
                    "locale": "ja",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "withdateranges": true,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview_n225"
                });
              </script>
          </div>
        </div>
    {% endblock %}
